  - slug: bi-aol
    categories: [data-science, coding, personal]
    thumbnail: "/assets/img/projects/Ecommerce-AOL-thumbnail.png"
    documentation_url: ""
    presentation_url: "/assets/docs/projects/BI Presentation- Ecommerce.pptx"
    description_en: |
      **E-Commerce Digital Goods Analysis** is a business-intelligence project built on **10M+ AOL search records**, using **Exasol** and advanced **SQL** to model e-commerce intent, category behavior, and time-series patterns.

      ### What it covers

      - **Star-schema data modeling** and an entity-relationship design for large-scale search analytics.
      - **Search volume & user trends** — peaks by day and hour, unique users, and alignment with external events.
      - **Category intent** and **competitive landscape** insights from query behavior.
      - **Market linkage** — AOL user-interest signals compared to **AAPL** and **eBay** stock trends.

      ### Stack & highlights

      **Exasol**, **Python**, **SQL**, and **time-series analysis** with a focus on actionable BI visuals and narrative conclusions for digital-goods strategy.

      Browse the **gallery** for charts and the ERD, or open the **presentation (PPTX)** for the full slide deck.
    description_de: |
      **E-Commerce-Analyse digitaler Güter** — ein BI-Projekt auf Basis von **über 10 Mio. AOL-Suchdatensätzen** mit **Exasol** und **SQL** zu E-Commerce-Intent, Kategorieverhalten und Zeitreihenmustern.

      ### Inhalte

      - **Sternschema** und **ER-Modell** für großskalige Suchanalytik.
      - **Suchvolumen & Nutzertrends** — Peaks nach Tag/Stunde, Unique Users, Bezug zu externen Ereignissen.
      - **Kategorie-Intent** und **Wettbewerbslandschaft** aus Suchverhalten.
      - **Marktbezug** — AOL-Interesse vs. **AAPL**- und **eBay**-Aktientrends.

      ### Technik

      **Exasol**, **Python**, **SQL**, **Time-Series** — mit klaren Visualisierungen und strategischen Empfehlungen für digitale Güter.

      **Galerie** für Charts und ERD; **Präsentation (PPTX)** für das vollständige Slide Deck.
