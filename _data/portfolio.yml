  - slug: chargehub
    categories: [data-science, coding, personal]
    thumbnail: "/assets/img/projects/charging-hub-thumbnail.png"
    documentation_url: "/assets/docs/projects/Charging-hub-station-documentation.pdf"
    presentation_url: ""
    description_en: |
      **ChargeHubBerlin** is a Streamlit web application for exploring and managing electric-vehicle charging infrastructure across Berlin. The platform surfaces more than **1,800 charging stations** on an interactive map, with filters, utilization views, and community-driven feedback.

      ### What it does

      - **Search & explore** nearby stations with geospatial views and demand indicators.
      - **Rate stations** — residents submit validated ratings; averages and reviews are published to all users.
      - **Report malfunctions** — operators and admins are notified, reporters earn reward points, and status updates flow back to the community.
      - **Suggest new locations** — users can propose sites and vote on suggestions.

      ### How it is built

      The system follows **Domain-Driven Design (DDD)** with two decoupled bounded contexts (rating and malfunction reporting), a shared authentication kernel, and role-based access for **Residents**, **Operators**, and **Admins**. The stack is **Python**, **Streamlit**, and **SQLite**, with a strong quality focus: **124 unit tests**, **~85% coverage**, and static analysis via **Qodana / PyCharm Inspect**.

      Open the **live app** to try the UI, browse the **gallery** below for architecture diagrams, or download the **full project documentation (PDF)** for the complete write-up.
    description_de: |
      **ChargeHubBerlin** ist eine Streamlit-Webanwendung zur Erkundung und Verwaltung der E-Ladeinfrastruktur in Berlin. Die Plattform zeigt über **1.800 Ladestationen** auf einer interaktiven Karte — mit Filtern, Auslastungsansichten und Community-Feedback.

      ### Funktionen

      - **Suchen & erkunden** — Stationen in der Nähe, Geodaten-Ansichten und Nachfrageindikatoren.
      - **Stationen bewerten** — validierte Bewertungen, Durchschnittswerte und veröffentlichte Reviews.
      - **Störungen melden** — Benachrichtigung von Betreibern/Admins, Belohnungspunkte für Meldende, Status-Updates für alle Nutzer.
      - **Neue Standorte vorschlagen** — Vorschläge einreichen und abstimmen.

      ### Technische Umsetzung

      **Domain-Driven Design (DDD)** mit zwei entkoppelten Bounded Contexts (Bewertung und Störungsmeldung), gemeinsamem Auth-Kernel und Rollen für **Residents**, **Operators** und **Admins**. Stack: **Python**, **Streamlit**, **SQLite** — plus **124 Unit-Tests**, **~85 % Abdeckung** und Qualitätschecks mit **Qodana / PyCharm Inspect**.

      **Live-App** ausprobieren, in der **Galerie** Architektur-Diagramme ansehen oder die **vollständige Projektdokumentation (PDF)** herunterladen.
