<div class="lang-switcher" role="group" aria-label="Language / Sprache">
  <span class="lang-switcher-label">
    <span data-lang="en">Language</span>
    <span data-lang="de">Sprache</span>
  </span>
  <div class="lang-switcher-btns">
    <button type="button" class="lang-btn" data-set-lang="en">EN</button>
    <button type="button" class="lang-btn" data-set-lang="de">DE</button>
  </div>
</div>
